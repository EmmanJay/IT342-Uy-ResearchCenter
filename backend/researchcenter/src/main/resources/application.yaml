spring:
  application:
    name: researchcenter
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
  refresh-expiration: 604800000

supabase:
  url: ${SUPABASE_URL:https://uddvltwfumyovjdhywfc.supabase.co}
  service-key: ${SUPABASE_SERVICE_ROLE}
  bucket: ${SUPABASE_BUCKET_NAME:research-materials}

google:
  books:
    api-key: ${GOOGLE_BOOKS_API_KEY}
